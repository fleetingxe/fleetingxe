TITLE: Collection of Fleeting thoughts #Blog title
URL: 'https://fleetingxe.github.com/' # Blog url, we use it to generate sitemap
BASE: '' # Blog base folder is any, most of the timme just ''
DESCRIPTION: Atomic logs # Blog description
LANG: EN # Blog language
DATE_LANG: en-US # Blog date format fr for dd/mm/yyyy en-US for mm/dd/yyyy
SITE_BANNER: false # Show site on top
STYLE: sans # Defaut blog style sans | serif | sans-and-serif | serif-and-sans
AUTHOR: Xenon # Author name
CONTACT: false # Set to false to omit email/contact link in header
EMAIL: false # Email
POST_COVER: false # Show post cover in post page
# MY_SWITCH: true #uncomment to add additional link to header.
# MY_LINK: https://link.to.something #copy structure for further links.
# Edit also relevant parts in 'src/types/config.d.ts' and 'src/components/header.astro'.
POST_THUMBNAILS: true # Show post cover in lists of posts 
POST_SUGGESTIONS: false # Suggest more posts to read based on tags
HOME_NB_POSTS: 6 # Number of posts to show on the home page
MENU: # Main menu 
  - label: Home # Example menu label
    url: http://fleetingxe.github.com/fleetingxe # Example menu url
  - label: rss
    url: https://thelostbayrpg.com/rss.xml

EDITOR:
  GITHUBUSER: # Github user name
  GITHUBREPO: # Github repo
